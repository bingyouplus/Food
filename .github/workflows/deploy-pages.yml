name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate runtime config
        env:
          AMAP_JS_KEY: ${{ secrets.AMAP_JS_KEY }}
          AMAP_SECURITY_JS_CODE: ${{ secrets.AMAP_SECURITY_JS_CODE }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const config = {
            amapJsKey: process.env.AMAP_JS_KEY || "",
            amapSecurityJsCode: process.env.AMAP_SECURITY_JS_CODE || "",
          };
          fs.writeFileSync(
            "src/runtime-config.local.js",
            `window.FOOD_MAP_CONFIG = {\n  ...(window.FOOD_MAP_CONFIG ?? {}),\n  amapJsKey: ${JSON.stringify(config.amapJsKey)},\n  amapSecurityJsCode: ${JSON.stringify(config.amapSecurityJsCode)},\n};\n`,
          );
          NODE

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - id: deployment
        uses: actions/deploy-pages@v4
